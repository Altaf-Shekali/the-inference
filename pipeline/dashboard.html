<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Inference — Control Panel</title>
<style>
  :root{
    --bg:#070b16; --panel:#0d1426; --panel2:#111a30; --hair:#1e2a45;
    --ink:#eaf0ff; --muted:#8da0c4; --accent:#3b9eff; --good:#34d399; --warn:#f5b301; --bad:#f43f5e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent)}
  header{display:flex;align-items:center;gap:14px;padding:18px 26px;border-bottom:1px solid var(--hair);position:sticky;top:0;background:rgba(7,11,22,.9);backdrop-filter:blur(8px);z-index:5}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:-.3px}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--good);box-shadow:0 0 10px var(--good)}
  header .yt{margin-left:auto;font-size:13px;color:var(--muted)}
  .wrap{max-width:1200px;margin:0 auto;padding:24px 26px 80px}
  .daily{background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:16px 18px;margin-bottom:24px}
  .daily h2{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .daily .row{display:flex;gap:22px;flex-wrap:wrap;font-size:14px}
  .daily b{color:var(--ink)}
  .daily pre{margin:12px 0 0;background:#060912;border:1px solid var(--hair);border-radius:10px;padding:12px;max-height:140px;overflow:auto;font-size:12px;color:#9fb3d8;white-space:pre-wrap}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .card{background:var(--panel);border:1px solid var(--hair);border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .thumb{aspect-ratio:16/9;background:#05080f center/cover no-repeat;position:relative;display:flex;align-items:center;justify-content:center;color:#33415f;font-size:13px}
  .pill{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
  .card .body{padding:13px 14px}
  .card h3{margin:0 0 9px;font-size:14px;font-weight:700;line-height:1.3}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .b{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;border:1px solid var(--hair);color:var(--muted)}
  .b.on{color:#04110a;background:var(--good);border-color:var(--good)}
  .b.short{color:#04110a;background:var(--accent);border-color:var(--accent)}
  .b.up{color:#1a1203;background:var(--warn);border-color:var(--warn)}
  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(2,4,10,.7);backdrop-filter:blur(3px);display:none;z-index:10}
  .scrim.open{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,100%);background:var(--panel2);border-left:1px solid var(--hair);transform:translateX(100%);transition:.22s;z-index:11;overflow:auto}
  .drawer.open{transform:none}
  .drawer .pad{padding:22px 24px 60px}
  .drawer h2{margin:2px 0 4px;font-size:18px}
  .x{position:absolute;top:14px;right:16px;font-size:22px;color:var(--muted);cursor:pointer;border:0;background:none}
  video{width:100%;border-radius:12px;background:#000;margin:12px 0;border:1px solid var(--hair)}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:16px 0 6px}
  input,textarea,select{width:100%;background:#0a1120;border:1px solid var(--hair);border-radius:9px;color:var(--ink);padding:10px 12px;font:inherit}
  textarea{min-height:80px;resize:vertical}
  .tagbox{font-size:13px}
  .btns{display:flex;gap:9px;flex-wrap:wrap;margin-top:8px}
  button.act{background:var(--accent);color:#03101f;border:0;border-radius:9px;padding:10px 15px;font-weight:700;cursor:pointer;font-size:14px}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--hair);border-radius:9px;padding:10px 15px;font-weight:600;cursor:pointer}
  button.ghost:hover{border-color:var(--accent)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .section{border-top:1px solid var(--hair);margin-top:22px;padding-top:6px}
  .section h4{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
  .uprow{display:flex;align-items:center;gap:10px;font-size:13px;padding:8px 0;border-bottom:1px solid var(--hair)}
  .uprow .k{font-weight:700;color:var(--ink)}
  .console{background:#04070f;border:1px solid var(--hair);border-radius:10px;padding:12px;font:12px/1.5 ui-monospace,Consolas,monospace;color:#9fe7c0;max-height:220px;overflow:auto;white-space:pre-wrap;margin-top:14px;display:none}
  .console.show{display:block}
  .authbox{background:var(--panel2);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-top:14px;font-size:14px;line-height:1.5}
  .authbox.err{border-color:var(--bad);color:var(--bad)}
  .authhd{font-size:15px;margin-bottom:8px}
  .authsteps{margin:0;padding-left:20px}
  .authsteps li{margin:10px 0}
  .authsteps code{background:#04070f;border:1px solid var(--hair);border-radius:5px;padding:1px 6px;font-size:12px}
  .authbox a.act{display:inline-block;text-decoration:none}
  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:60px 0}
  .grid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sim{border-radius:9px;padding:10px 12px;font-size:13px;margin:6px 0 12px;border:1px solid var(--hair);line-height:1.45}
  .sim.good{border-color:var(--good);background:rgba(52,211,153,.08)}
  .sim.warn{border-color:var(--warn);background:rgba(245,179,1,.08)}
  .sim.bad{border-color:var(--bad);background:rgba(244,63,94,.1)}
  label.ck{display:flex;gap:9px;align-items:flex-start;text-transform:none;letter-spacing:0;color:var(--ink);font-size:13px;margin:9px 0;cursor:pointer}
  label.ck input{width:auto;margin:2px 0 0;flex:0 0 auto}
  #today{border-width:2px}
  #today.ok{border-color:var(--good)} #today.warn{border-color:var(--warn)}
  .tbanner{font-size:15px;font-weight:700;margin:2px 0 14px}
  .trow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--hair)}
  .trow:last-child{border-bottom:0}
  .tstate{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;min-width:150px}
  .tdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
  .tname{font-weight:700;flex:1;min-width:120px}
  .tsub{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>The Inference — Control Panel</h1>
  <span class="yt" id="yt"></span>
</header>

<div class="wrap">
  <div class="daily" id="today"></div>
  <div class="daily" id="generate"></div>
  <div class="daily" id="channels"></div>
  <div class="daily" id="daily"></div>
  <div id="grid" class="grid"></div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div class="pad" id="drawerBody"></div></div>

<script>
const $ = (s,r=document)=>r.querySelector(s);
let STATE={videos:[],daily:{},youtube:false};
let current=null;

async function load(){
  STATE = await fetch('/api/state').then(r=>r.json());
  $('#yt').textContent = STATE.youtube ? '● YouTube connected' : '○ YouTube not authorized (run npm run yt-auth)';
  $('#yt').style.color = STATE.youtube ? 'var(--good)' : 'var(--bad)';
  renderToday();
  renderGenerate();
  renderChannels();
  renderDaily();
  renderGrid();
}

function renderToday(){
  const t=STATE.today||{channels:[]};
  const task=(STATE.daily&&STATE.daily.task)||{};
  const langName={en:'English',hi:'Hindi',kn:'Kannada'};
  const enabled=(t.channels||[]).filter(c=>c.enabled);
  // status per channel: green=uploaded today, red=can't (not authorized), amber=pending
  const state=c=>!c.youtube?{k:'bad',dot:'var(--bad)',txt:'Not authorized'}
    :c.uploadedToday?{k:'ok',dot:'var(--good)',txt:'Uploaded today ✓'}
    :{k:'warn',dot:'var(--warn)',txt:'Pending today'};
  const allOk=enabled.length>0 && enabled.every(c=>c.uploadedToday);
  const anyBad=enabled.some(c=>!c.youtube);
  $('#today').className='daily '+(allOk?'ok':anyBad?'warn':'');
  const banner=allOk?`✅ All ${enabled.length} channel(s) uploaded today.`
    :anyBad?`⚠️ A channel needs YouTube authorization — see Channels below.`
    :`⏳ Waiting for today's uploads (${enabled.filter(c=>c.uploadedToday).length}/${enabled.length} done).`;
  const rows=enabled.map(c=>{
    const s=state(c);
    const links=(c.todayUploads||[]).map(u=>`<a href="${u.url}" target="_blank">${u.kind}</a>`).join(' · ');
    const sub=c.uploadedToday?`today · ${links}`:c.last?`last: ${c.last.date}${c.last.url?` · <a href="${c.last.url}" target="_blank">link</a>`:''}`:'no uploads yet';
    return `<div class="trow">
      <span class="tstate"><span class="tdot" style="background:${s.dot}"></span>${s.txt}</span>
      <span class="tname">${esc(c.name)} <span class="b">${langName[c.lang]||c.lang}</span></span>
      <span class="tsub" style="min-width:150px">🕒 upload ${esc(c.uploadTime||'19:30')} · render ${esc(c.renderTime||minus1h(c.uploadTime||'19:30'))}</span>
      <span class="tsub">${sub}</span>
    </div>`;
  }).join('');
  const sched=task.installed?`⏰ ${task.count} channel task(s) scheduled · next run <b>${task.nextRun||'—'}</b>`
    :`<span style="color:var(--warn)">⏰ Schedule not installed — run pipeline\\install-schedule.ps1</span>`;
  $('#today').innerHTML=`<h2>Today · ${t.date||''}</h2>
    <div class="tbanner">${banner}</div>
    ${rows||'<div class="muted">No enabled channels.</div>'}
    <div class="tsub" style="margin-top:12px;padding-top:10px;border-top:1px solid var(--hair)">${sched}</div>`;
}

function renderChannels(){
  const chs=STATE.channels||[];
  const langName={en:'English',hi:'Hindi',kn:'Kannada'};
  const rows=chs.map(c=>`<div class="uprow" style="flex-wrap:wrap;gap:8px">
      <span class="k" style="min-width:170px">${esc(c.name)} <span class="b">${langName[c.lang]||c.lang}</span>${c.niche&&c.niche!=='ainews'?` <span class="b">${c.niche==='psych'?'🧠 psych':c.niche==='quiz'?'❓ quiz':'📖 stories'}</span>`:''}${c.enabled?'':' <span class="b" style="color:var(--warn)">off</span>'}</span>
      <span style="display:flex;align-items:center;gap:6px" title="upload time (local)">🕒
        <input type="time" id="ct-${c.id}" value="${esc(c.uploadTime||'19:30')}" style="width:105px;padding:6px 8px">
        <button class="ghost" onclick="saveChannelTime('${c.id}')" style="padding:7px 10px">Save</button>
        <span class="tsub">render ${esc(c.renderTime||minus1h(c.uploadTime||'19:30'))}</span></span>
      <span style="min-width:110px;color:${c.youtube?'var(--good)':'var(--bad)'}">${c.youtube?'● ready':'○ not auth'}</span>
      <button class="ghost" onclick="authChannel('${c.id}')">${c.youtube?'Re-auth':'Authorize'}</button>
      <button class="ghost" onclick="toggleChannel('${c.id}',${!c.enabled})">${c.enabled?'Disable':'Enable'}</button>
      ${c.id!=='the-inference'?`<button class="ghost" onclick="deleteChannel('${c.id}','${esc(c.name)}')">Delete</button>`:''}
    </div>`).join('');
  $('#channels').innerHTML=`<h2>Channels <button class="ghost" onclick="applySchedule()" style="float:right;font-size:12px;padding:6px 12px">⚙ Apply schedule</button></h2>${rows}
    <div style="margin-top:14px;border-top:1px solid var(--hair);padding-top:12px">
      <div class="row" style="align-items:flex-end;gap:10px">
        <div style="min-width:150px"><label style="margin-top:0">ID (a-z, -)</label><input id="chId" placeholder="the-inference-kn"/></div>
        <div style="flex:1;min-width:150px"><label style="margin-top:0">Name</label><input id="chName" placeholder="The Inference ಕನ್ನಡ"/></div>
        <div style="min-width:120px"><label style="margin-top:0">Language</label>
          <select id="chLang"><option value="en">English</option><option value="hi">Hindi</option><option value="kn">Kannada</option></select></div>
        <div style="min-width:130px"><label style="margin-top:0">Niche</label>
          <select id="chNiche"><option value="ainews">AI / Tech news</option><option value="story">True stories</option><option value="psych">Psychology stories</option><option value="quiz">Current-affairs quiz</option></select></div>
        <div style="min-width:130px"><label style="margin-top:0">Upload time (local)</label>
          <input id="chTime" type="time" value="19:30"/></div>
        <div style="min-width:110px"><label style="margin-top:0">Privacy</label>
          <select id="chPriv"><option value="private">Private</option><option value="unlisted">Unlisted</option><option value="public">Public</option></select></div>
        <button class="act" onclick="addChannel()">Add channel</button>
      </div>
    </div>
    <div id="authPanel"></div>
    <pre class="console" id="chConsole"></pre>`;
}

async function addChannel(){
  const id=$('#chId').value.trim(), name=$('#chName').value.trim();
  if(!id) return flashIn('chConsole','Enter an id (lowercase letters, numbers, hyphens).');
  const r=await postJSON('/api/channels/add',{id,name,lang:$('#chLang').value,niche:$('#chNiche').value,uploadTime:$('#chTime').value,privacy:$('#chPriv').value});
  if(r.error) return flashIn('chConsole',r.error);
  flashIn('chConsole',`✓ Added "${r.channel.name}". Scheduling… then click Authorize YouTube for it.`);
  $('#generate').innerHTML=''; // force the Generate panel to rebuild with the new channel
  await load(); applySchedule();
}

async function saveChannelTime(id){
  const t=$('#ct-'+id).value;
  const r=await postJSON('/api/channels/update',{id,uploadTime:t});
  if(r.error) return flashIn('chConsole',r.error);
  flashIn('chConsole',`✓ ${id} upload time → ${t}. Updating schedule…`);
  await load(); applySchedule();
}
async function toggleChannel(id,enabled){
  await postJSON('/api/channels/update',{id,enabled});
  await load(); applySchedule();
}
async function deleteChannel(id,name){
  if(!confirm(`Delete channel "${name}"? (its videos on YouTube are not affected)`)) return;
  const r=await postJSON('/api/channels/delete',{id});
  if(r.error) return flashIn('chConsole',r.error);
  $('#generate').innerHTML=''; await load(); applySchedule();
}
function applySchedule(){
  const c=$('#chConsole'); c.classList.add('show'); c.textContent='Applying Windows schedule…\n';
  postJSON('/api/schedule/install',{}).then(r=>{
    const es=new EventSource('/api/job/'+r.jobId);
    es.onmessage=e=>{ c.textContent+=JSON.parse(e.data)+'\n'; c.scrollTop=c.scrollHeight; };
    es.addEventListener('done',()=>{ es.close(); load(); }); es.onerror=()=>es.close();
  });
}

// Clean, phone-friendly YouTube auth — no blocking popup. Shows the Google
// sign-in link (tap on the phone, or copy it), then you paste the resulting
// localhost URL/code back and Finish. Works entirely on a phone.
async function authChannel(id){
  const panel=$('#authPanel'); if(!panel) return;
  panel.innerHTML='<div class="authbox">Loading sign-in link…</div>';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  let r;
  try{ r=await (await fetch('/api/channel/auth-url?channel='+encodeURIComponent(id))).json(); }
  catch(e){ r={error:'could not reach server'}; }
  if(!r || r.error){ panel.innerHTML='<div class="authbox err">⚠️ '+esc((r&&r.error)||'failed to build sign-in link')+'</div>'; return; }
  const u=r.url;
  panel.innerHTML=`<div class="authbox">
    <div class="authhd">Authorize <b>${esc(r.name||id)}</b> <button class="ghost" onclick="closeAuth()" style="float:right;padding:4px 10px">✕</button></div>
    <ol class="authsteps">
      <li><a class="act" href="${esc(u)}" target="_blank" rel="noopener">Open Google sign-in ↗</a>
          <button class="ghost" onclick="copyText('${esc(u).replace(/'/g,"\\'")}',this)">Copy link</button>
          <div class="tsub">Approve with <b>${esc(r.name||id)}</b>'s Google account. On a phone, just tap the button above.</div></li>
      <li>Google then shows a <code>localhost</code> page that won't load — that's expected. <b>Copy that page's full address</b> from the browser bar (it contains the code).</li>
      <li>Paste it here and Finish:
          <div class="row" style="gap:8px;margin-top:6px">
            <input id="authCode-${id}" placeholder="http://localhost:53682/?code=…  (or just the code)" style="flex:1;min-width:200px"/>
            <button class="act" onclick="finishAuth('${id}')">Finish</button>
          </div></li>
    </ol>
    <div id="authMsg-${id}" class="tsub"></div>
  </div>`;
}
function closeAuth(){ const p=$('#authPanel'); if(p) p.innerHTML=''; }
function copyText(t,btn){ navigator.clipboard.writeText(t).then(()=>{ if(btn){ const o=btn.textContent; btn.textContent='Copied ✓'; setTimeout(()=>btn.textContent=o,1500);} }).catch(()=>{}); }
function finishAuth(id){
  const inp=$('#authCode-'+id); const msg=$('#authMsg-'+id);
  const code=(inp&&inp.value||'').trim();
  if(!code){ if(msg) msg.textContent='Paste the localhost URL or code first.'; return; }
  if(msg) msg.textContent='Exchanging code…';
  postJSON('/api/channel/yt-code',{id,code}).then(r=>{
    if(!r||r.error){ if(msg) msg.textContent='⚠️ '+((r&&r.error)||'failed'); return; }
    const es=new EventSource('/api/job/'+r.jobId); let out='';
    es.onmessage=e=>{ out=JSON.parse(e.data); if(msg) msg.textContent=out; };
    es.addEventListener('done',ev=>{ es.close(); const ok=String(ev.data)==='0';
      if(msg) msg.textContent=ok?'✓ Authorized — refreshing…':'⚠️ '+(out||'exchange failed (the code may be expired — retry Open Google sign-in)');
      if(ok){ closeAuth(); load(); } });
    es.onerror=()=>es.close();
  });
}

function flashIn(id,msg){ const c=$('#'+id); if(c){ c.classList.add('show'); c.textContent=msg; } }
function minus1h(hhmm){ const [h,m]=String(hhmm).split(':').map(Number); return String((h+23)%24).padStart(2,'0')+':'+String(m||0).padStart(2,'0'); }

function renderGenerate(){
  if($('#genConsole')) return; // build once; don't wipe an in-progress log
  const pillars=[['','Auto (rotates by day)'],['ainews','AI News'],['tools','Tool Breakdown'],['trend','Tech Trend'],['business','Business']];
  const voiceOpts=voiceOptions('Default (Edge · Andrew — standard)');
  const chanOpts=(STATE.channels||[]).map(c=>`<option value="${c.id}">${esc(c.name)}${c.youtube?'':' ⚠'}</option>`).join('');
  $('#generate').innerHTML = `<h2>Generate new content</h2>
    <div class="row" style="align-items:flex-end;gap:12px">
      <div style="min-width:150px"><label style="margin-top:0">Channel</label>
        <select id="genChannel" onchange="onLangChange()">${chanOpts}</select></div>
      <div style="min-width:140px"><label style="margin-top:0">Pillar</label>
        <select id="genPillar">${pillars.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select></div>
      <div style="min-width:130px"><label style="margin-top:0">Language</label>
        <select id="genLang" onchange="onLangChange()">
          <option value="">Auto (channel)</option>
          <option value="en">English</option>
          <option value="hi">हिन्दी Hindi</option>
          <option value="kn">ಕನ್ನಡ Kannada</option>
        </select></div>
      <div style="flex:1;min-width:200px"><label style="margin-top:0">Topic (optional — blank = auto-discover)</label>
        <input id="genTopic" placeholder="e.g. OpenAI's new agent pricing" /></div>
      <div style="min-width:200px"><label style="margin-top:0">Voice</label>
        <div style="display:flex;gap:8px">
          <select id="genVoice" style="flex:1">${voiceOpts}</select>
          <button class="ghost" id="genSampleBtn" onclick="sampleVoice('genVoice','genSampleBtn')" title="Hear this voice">🔊</button>
        </div></div>
    </div>
    <div class="btns" style="margin-top:12px">
      <button class="act" id="genBtn" onclick="generate(false)">Generate long-form (16:9)</button>
      <button class="ghost" id="genShortBtn" onclick="generate(true)">Generate Short (9:16, ~30s)</button>
      <span class="muted" style="font-size:13px;align-self:center">Own script, own render. No upload — review it in the Library after.</span>
    </div>
    <pre class="console" id="genConsole"></pre>`;
}

function onLangChange(){
  // effective language = explicit hi/kn, else the selected channel's language.
  // Non-English auto-picks its native Edge voice, so disable the voice picker.
  const lv=$('#genLang').value;
  const ch=(STATE.channels||[]).find(c=>c.id===$('#genChannel').value);
  const effLang=(lv==='hi'||lv==='kn')?lv:(lv==='en'?'en':(ch?ch.lang:'en'));
  const nonEn=effLang!=='en';
  $('#genVoice').disabled=nonEn; $('#genSampleBtn').disabled=nonEn;
  $('#genVoice').title=nonEn?'Voice auto-selected for this language':'';
}

async function generate(short){
  const pillar=$('#genPillar').value, topic=$('#genTopic').value.trim(), voice=$('#genVoice').value, lang=$('#genLang').value, channel=$('#genChannel').value;
  $('#genBtn').disabled=true; $('#genShortBtn').disabled=true;
  const c=$('#genConsole'); c.classList.add('show');
  c.textContent=`Starting ${channel} ${short?'Short':'long-form'}… this takes a few minutes (discover → research → script → render).\n`;
  const r=await postJSON('/api/generate',{pillar,topic,short,voice,lang,channel});
  const es=new EventSource('/api/job/'+r.jobId);
  es.onmessage=(e)=>{ c.textContent+=JSON.parse(e.data)+'\n'; c.scrollTop=c.scrollHeight; };
  const reset=()=>{ $('#genBtn').disabled=false; $('#genShortBtn').disabled=false; };
  es.addEventListener('done',()=>{ es.close(); reset(); c.textContent+='\n(done — refreshing Library)\n'; load(); });
  es.onerror=()=>{ es.close(); reset(); };
}

function renderDaily(){
  const d=STATE.daily||{}; const t=d.task||{}; const log=d.lastLog;
  const rows = t.installed
    ? (t.tasks||[]).map(x=>`<span>${esc(x.id)}: next <b>${x.next||'—'}</b> · last ${x.last&&!/^0001/.test(x.last)?x.last:'—'} (${x.result})</span>`).join('')
    : `<span class="muted">Not installed — enable with <b>pipeline\\install-schedule.ps1</b></span>`;
  $('#daily').innerHTML = `<h2>Scheduled tasks ${t.installed?'· '+t.count+' active':''}</h2><div class="row" style="flex-direction:column;gap:6px">${rows}</div>`
    + (log?`<pre>${esc(log.tail)}</pre>`:'');
}

function statusBadges(v){
  const ups=v.uploads||[];
  const longUp=ups.find(u=>u.kind==='long'); const shortUp=ups.find(u=>u.kind==='short');
  let h='';
  h+=`<span class="b ${v.hasVideo?'on':''}">${v.hasVideo?'✓ ':''}Video</span>`;
  h+=`<span class="b ${v.hasShort?'short':''}">${v.hasShort?'✓ ':''}Short</span>`;
  if(longUp) h+=`<span class="b up">▶ Uploaded</span>`;
  if(shortUp) h+=`<span class="b up">▶ Short up</span>`;
  return h;
}

function renderGrid(){
  if(!STATE.videos.length){ $('#grid').innerHTML='<div class="empty">No videos yet. Run <b>npm run daily-upload</b> to make one.</div>'; return; }
  $('#grid').innerHTML = STATE.videos.map((v,i)=>`
    <div class="card" onclick="openDrawer(${i})">
      <div class="thumb" ${v.hasThumb?`style="background-image:url(/api/file?kind=thumb&base=${encodeURIComponent(v.base)})"`:''}>
        ${v.hasThumb?'':'no thumbnail'}
        ${v.pillar?`<span class="pill" style="color:${v.accent}">${esc(v.pillar)}</span>`:''}
      </div>
      <div class="body">
        <h3>${esc(v.title)}</h3>
        <div class="badges">${statusBadges(v)}</div>
      </div>
    </div>`).join('');
}

function openDrawer(i){
  current=STATE.videos[i];
  const v=current;
  const ups=v.uploads||[];
  $('#drawerBody').innerHTML = `
    <button class="x" onclick="closeDrawer()">×</button>
    <div class="muted" style="font-size:12px">${esc(v.base)} · ${esc(v.channel||'the-inference')} · ${esc((v.lang||'en').toUpperCase())}</div>
    <h2 id="dTitleH">${esc(v.title)}</h2>
    ${v.hasVideo?`<video controls preload="metadata" poster="${v.hasThumb?`/api/file?kind=thumb&base=${encodeURIComponent(v.base)}`:''}" src="/api/file?kind=long&base=${encodeURIComponent(v.base)}"></video>`:'<p class="muted">Long-form video not rendered.</p>'}

    <div class="section"><h4>Shorts</h4>
      ${v.hasShort?`<video controls preload="metadata" src="/api/file?kind=short&base=${encodeURIComponent(v.base)}" style="max-height:420px"></video>`:'<p class="muted">No Short rendered yet.</p>'}
      <label>Voice</label>
      <div style="display:flex;gap:8px">
        <select id="fVoice" style="flex:1">${voiceOptions('Same as long-form (reuse existing audio)')}</select>
        <button class="ghost" id="sampleBtn" onclick="sampleVoice('fVoice','sampleBtn')" title="Hear this voice">🔊</button>
      </div>
      <p class="muted" style="font-size:12px;margin:8px 0 0">A different voice re-renders the Short's narration only — your long-form video is untouched.</p>
      <div class="btns">
        <button class="ghost" ${!(v.hasProps||v.hasScript)?'disabled title="render the long-form first"':''} onclick="renderShort()">${v.hasShort?'Re-render Short':'Render Short (9:16)'}</button>
        ${v.hasShort?`<button class="act" onclick="upload('short')">Upload as Short</button>`:''}
      </div>
    </div>

    <div class="section"><h4>Edit details</h4>
      <label>Title</label><input id="fTitle" value="${esc(v.title)}" />
      <label>Description</label><textarea id="fDesc">${esc(v.description)}</textarea>
      <label>Tags (comma separated)</label><textarea id="fTags" class="tagbox">${esc((v.tags||[]).join(', '))}</textarea>
      <div class="btns"><button class="ghost" onclick="saveMeta()">Save details</button></div>
    </div>

    <div class="section"><h4>Pre-upload review (YPP)</h4>
      ${simBanner(v)}
      <label class="ck"><input type="checkbox" id="ck1"> Facts &amp; numbers spot-checked against the real sources (no AI hallucinations)</label>
      <label class="ck"><input type="checkbox" id="ck2"> Has original commentary/analysis — not just restating headlines</label>
      <label class="ck"><input type="checkbox" id="ck3"> Distinct enough from recent uploads (intro, angle &amp; visuals vary)</label>
      <label class="ck"><input type="checkbox" id="ck4"> Footage/music licensed; AI-disclosure label considered if it shows realistic AI imagery of real people/events</label>
      <p class="muted" style="font-size:12px;margin:6px 0 0">Synthetic voice over stock footage &amp; graphics generally needs no "altered content" label — but realistic AI visuals of real people/events do.</p>
    </div>

    <div class="section"><h4>Upload to YouTube</h4>
      <div class="grid-row">
        <div><label>Privacy</label>
          <select id="fPriv"><option value="private">Private</option><option value="unlisted">Unlisted</option><option value="public">Public</option></select>
        </div>
        <div><label>Schedule (optional, public)</label><input id="fAt" type="datetime-local" /></div>
      </div>
      <div class="btns"><button class="act" ${!v.hasVideo?'disabled':''} onclick="upload('long')">Upload video</button></div>
      ${ups.length?`<div style="margin-top:14px">${ups.map(u=>`<div class="uprow"><span class="k">${u.kind}</span><span>${u.privacy}</span><a href="${u.url}" target="_blank">${u.url.replace('https://','')}</a></div>`).join('')}</div>`:''}
    </div>

    <pre class="console" id="console"></pre>`;
  $('#scrim').classList.add('open'); $('#drawer').classList.add('open');
}
function closeDrawer(){ $('#scrim').classList.remove('open'); $('#drawer').classList.remove('open'); current=null; }

async function saveMeta(){
  const tags = $('#fTags').value.split(',').map(s=>s.trim()).filter(Boolean);
  await postJSON('/api/meta',{base:current.base,title:$('#fTitle').value,description:$('#fDesc').value,tags});
  await load(); flash('Saved.');
}

async function renderShort(){
  const voice = $('#fVoice').value;
  const r = await postJSON('/api/render-short',{base:current.base,voice});
  if(r.error) return flash(r.error);
  streamJob(r.jobId, voice?'Re-voicing narration + rendering Short… (a couple of minutes)':'Rendering Short… (this takes a minute)');
}

let sampleAudio=null;
function sampleVoice(selId,btnId){
  const voice=$('#'+selId).value;
  const b=$('#'+btnId);
  if(!voice){ flash('Default voice selected — nothing to preview.'); return; }
  b.disabled=true; b.textContent='…';
  if(sampleAudio) sampleAudio.pause();
  sampleAudio=new Audio('/api/voice-sample?voice='+encodeURIComponent(voice));
  sampleAudio.onended=sampleAudio.onerror=()=>{ b.disabled=false; b.textContent='🔊'; };
  sampleAudio.play().catch(()=>{ b.disabled=false; b.textContent='🔊'; });
}

function simBanner(v){
  const s=v.similar;
  if(!s) return `<div class="sim good">No earlier videos to compare against yet. ✓</div>`;
  const cls = s.score>=60?'bad':s.score>=35?'warn':'good';
  const verdict = s.score>=60
    ? '⚠ Very similar to a recent upload — vary the angle, script & visuals before publishing to avoid YouTube’s repetitious-content flag.'
    : s.score>=35 ? 'Somewhat similar — fine, but keep adding original value.'
    : 'Distinct from your recent uploads. ✓';
  return `<div class="sim ${cls}">Closest recent video: <b>${s.score}%</b> overlap — “${esc(s.title)}”<br><span class="muted">${verdict}</span></div>`;
}

function reviewOk(){
  const missed=['ck1','ck2','ck3','ck4'].filter(id=>!$('#'+id)?.checked).length;
  return missed===0 || confirm(`Pre-upload review: ${missed} item(s) not ticked. Upload anyway?`);
}

async function upload(kind){
  const chId=current.channel||'the-inference';
  const ch=(STATE.channels||[]).find(c=>c.id===chId);
  if(ch && !ch.youtube) return flash(`Channel "${ch.name}" isn't authorized yet — authorize it in the Channels panel.`);
  if(!reviewOk()) return;
  const priv = $('#fPriv').value;
  const atRaw = $('#fAt').value;
  const at = atRaw ? new Date(atRaw).toISOString() : '';
  const r = await postJSON('/api/upload',{base:current.base,kind,privacy:priv,at,channel:chId});
  streamJob(r.jobId, `Uploading ${kind} to ${chId}…`);
}

function streamJob(id,intro){
  const c=$('#console'); c.classList.add('show'); c.textContent=(intro||'')+'\n';
  const es=new EventSource('/api/job/'+id);
  es.onmessage=(e)=>{ c.textContent += JSON.parse(e.data)+'\n'; c.scrollTop=c.scrollHeight; };
  es.addEventListener('done',(e)=>{ es.close(); c.textContent+=`\n(done)\n`; load(); });
  es.onerror=()=>{ es.close(); };
}

function voiceOptions(emptyLabel){
  return (STATE.voices||[]).map(o=>`<option value="${o.value}">${o.value===''?emptyLabel:esc(o.label)}</option>`).join('');
}
function flash(msg){ const c=$('#console'); if(c){ c.classList.add('show'); c.textContent=msg; } }
async function postJSON(u,b){ return fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

load();
setInterval(()=>{ if(!current) load(); }, 15000);
</script>
</body>
</html>
